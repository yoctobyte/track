<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ title }}{% endblock %}</title>
  <style>
    :root {
      --bg: #f2eee6;
      --panel: #fffaf2;
      --ink: #1c1a17;
      --muted: #655f56;
      --line: #d8cdbc;
      --accent: #3d6fb4;
      --accent-soft: #dde8f7;
      --olive: #5a6a38;
      --warn: #a65f28;
      --shadow: 0 18px 40px rgba(30, 27, 23, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(61, 111, 180, 0.08), transparent 28%),
        linear-gradient(180deg, #f6f2eb 0%, #ece3d4 100%);
      color: var(--ink);
    }
    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1.25rem;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: end;
      margin-bottom: 1.5rem;
    }
    .brand h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.04em;
    }
    .brand p {
      margin: 0.3rem 0 0;
      color: var(--muted);
    }
    .topnav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .topnav a {
      text-decoration: none;
      color: var(--ink);
      padding: 0.55rem 0.8rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.62);
    }
    .topnav a.active {
      background: var(--accent-soft);
      border-color: rgba(61,111,180,0.35);
      color: #18416f;
    }
    .card {
      background: rgba(255, 250, 242, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 1rem 1.1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 0.28rem 0.55rem;
      background: #e6efe9;
      color: #35503b;
    }
    .badge.planned {
      background: #f3ead6;
      color: #8a6123;
    }
    .badge.private {
      background: #e2ebf8;
      color: #295389;
    }
    .muted { color: var(--muted); }
    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 0.6rem 0.9rem;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .btn.secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(61,111,180,0.28);
    }
    .stack > * + * { margin-top: 0.8rem; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
    }
    @media (max-width: 800px) {
      .topbar, .row {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <h1>{{ title }}</h1>
        <p>{{ subtitle }}</p>
      </div>
      <div class="topnav">
        <a href="/" class="{% if not current_environment %}active{% endif %}">Environments</a>
        {% for env in environments %}
          <a href="{{ url_for('environment_detail', env_id=env.id) }}" class="{% if current_environment and current_environment.id == env.id %}active{% endif %}">
            {{ env.name }}
          </a>
        {% endfor %}
      </div>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
