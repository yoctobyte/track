<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TRACK Sync Login</title>
  <style>
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: #eef1ec; color: #172018; }
    main { max-width: 420px; margin: 12vh auto; padding: 32px; background: #fffaf0; border: 1px solid #ccd2c5; border-radius: 18px; }
    input, button { width: 100%; box-sizing: border-box; padding: 12px; margin-top: 10px; font: inherit; }
    button { background: #263f2f; color: white; border: 0; border-radius: 10px; cursor: pointer; }
    .error { color: #9b271f; }
  </style>
</head>
<body>
  <main>
    <h1>TRACK Sync</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post">
      <label>Password</label>
      <input type="password" name="password" autofocus>
      <button type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
