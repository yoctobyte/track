<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}map3d{% endblock %}</title>
  <style>
    :root {
      --bg-deep:     #d7c89b;
      --bg-surface:  #413628;
      --bg-card:     #efe4bc;
      --bg-raised:   #5b4a37;
      --purple:      #7d4bdb;
      --purple-dim:  #5f35b4;
      --purple-glow: #c5a7ff;
      --pink:        #df4d91;
      --pink-hot:    #ff72b3;
      --neon-green:  #4eea77;
      --neon-cyan:   #18d3d7;
      --neon-orange: #ff9447;
      --brown-70s:   #8b6941;
      --brown-warm:  #5f472f;
      --text:        #2f261d;
      --text-dim:    #6f604f;
      --text-bright: #fff8e7;
      --border:      #9d875d;
      --border-glow: rgba(125, 75, 219, 0.22);
      --shadow:      0 12px 28px rgba(72, 57, 34, 0.18), 0 2px 6px rgba(72, 57, 34, 0.12);
      --shadow-glow: 0 12px 28px rgba(125, 75, 219, 0.18), 0 2px 6px rgba(72, 57, 34, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 1100px; margin: 0 auto; padding: 1em;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 247, 214, 0.7), transparent 38%),
        linear-gradient(180deg, #e3d4a3 0%, #d7c89b 48%, #ccb985 100%);
    }

    /* --- Nav --- */
    nav {
      background: linear-gradient(135deg, var(--bg-surface) 0%, var(--bg-raised) 100%);
      padding: 0.8em 1.2em; border-radius: 8px; margin-bottom: 1.5em;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex; gap: 0.3em; flex-wrap: wrap;
    }
    nav a {
      color: var(--purple-glow); text-decoration: none; padding: 0.3em 0.9em;
      border-radius: 4px; font-weight: 600; transition: all 0.15s;
    }
    nav a:hover {
      color: var(--text-bright); background: var(--purple-dim);
      box-shadow: 0 0 12px rgba(125, 75, 219, 0.34);
    }

    /* --- Typography --- */
    h1, h2, h3 { margin-bottom: 0.5em; color: var(--brown-warm); }
    h1 { font-size: 1.5em; }
    h1::after {
      content: ''; display: block; width: 60px; height: 2px; margin-top: 0.3em;
      background: linear-gradient(90deg, var(--pink-hot), var(--purple), transparent);
    }
    a { color: var(--pink-hot); }
    a:hover { color: var(--neon-cyan); }

    /* --- Flash messages --- */
    .flash {
      background: linear-gradient(135deg, rgba(78, 234, 119, 0.14), rgba(78, 234, 119, 0.06));
      border: 1px solid rgba(78, 234, 119, 0.35); color: #246235;
      padding: 0.6em 1em; border-radius: 6px; margin-bottom: 1em;
    }
    .flash.error {
      background: linear-gradient(135deg, rgba(223, 77, 145, 0.14), rgba(223, 77, 145, 0.06));
      border-color: rgba(223, 77, 145, 0.32); color: #8a1d57;
    }

    /* --- Forms --- */
    form { margin-bottom: 1em; }
    label { display: block; margin: 0.4em 0 0.2em; font-weight: 500; color: var(--text-dim); }
    input, select, textarea, button { font-size: 1em; padding: 0.4em 0.6em; }
    input[type="text"], input[type="number"], input[type="file"], select, textarea {
      width: 100%; max-width: 400px;
      background: rgba(255, 251, 236, 0.86); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--purple);
      box-shadow: 0 0 0 2px var(--border-glow);
    }
    textarea { height: 3em; }
    ::placeholder { color: var(--text-dim); opacity: 0.6; }

    /* --- Buttons --- */
    button, .btn {
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dim) 100%);
      color: var(--text-bright); border: none; padding: 0.5em 1.2em;
      border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block;
      font-weight: 600; transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(125, 75, 219, 0.24);
    }
    button:hover, .btn:hover {
      background: linear-gradient(135deg, var(--purple-glow) 0%, var(--purple) 100%);
      box-shadow: 0 4px 16px rgba(125, 75, 219, 0.36);
      transform: translateY(-1px);
    }
    .btn-sm { padding: 0.3em 0.8em; font-size: 0.85em; }
    .btn-danger {
      background: linear-gradient(135deg, var(--pink) 0%, #b72a68 100%);
      box-shadow: 0 2px 8px rgba(223, 77, 145, 0.26);
    }
    .btn-danger:hover {
      background: linear-gradient(135deg, var(--pink-hot) 0%, var(--pink) 100%);
      box-shadow: 0 4px 16px rgba(223, 77, 145, 0.34);
    }

    /* --- Tables --- */
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid var(--border); padding: 0.5em 0.8em; text-align: left; }
    th { background: var(--bg-raised); color: var(--purple-glow); font-weight: 600; }
    td { background: rgba(251, 244, 213, 0.8); }
    tr:hover td { background: rgba(163, 130, 79, 0.09); }

    /* --- Cards --- */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 1em; margin-bottom: 1em;
      box-shadow: var(--shadow);
    }
    .card:hover { border-color: var(--border-glow); }

    /* --- Gallery grid --- */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1em; }
    .grid .thumb {
      background: var(--bg-raised); border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border); transition: all 0.2s;
      box-shadow: var(--shadow);
    }
    .grid .thumb:hover {
      border-color: var(--pink); transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(223, 77, 145, 0.18), 0 2px 6px rgba(72, 57, 34, 0.16);
    }
    .grid .thumb img { width: 100%; height: 180px; object-fit: cover; display: block; }
    .grid .thumb .info { padding: 0.5em; font-size: 0.85em; color: var(--text-dim); }

    /* --- Location tree --- */
    .tree { list-style: none; padding-left: 1.5em; }
    .tree > li { margin: 0.3em 0; }
    .tree strong { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(24, 211, 215, 0.15); }

    /* --- Meta tables --- */
    .meta-table td:first-child { font-weight: 500; width: 180px; color: var(--brown-70s); }
    code { color: var(--neon-orange); font-size: 0.9em; }

    /* --- Status colors --- */
    .status-done { color: var(--neon-green); }
    .status-processing { color: var(--neon-orange); }
    .status-pending { color: var(--text-dim); }
    .status-failed { color: var(--pink); }
    .status-granted { color: var(--neon-green); }
    .status-denied { color: var(--pink); }

    /* --- Utilities --- */
    .inline-form { display: inline; }
    .muted { color: var(--text-dim); }
    .mb { margin-bottom: 1em; }

    /* --- Scrollbar --- */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #d3c18c; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--purple-dim); }

    /* --- Selection --- */
    ::selection { background: var(--purple); color: var(--text-bright); }
  </style>
</head>
<body>
  {% if session.get('authenticated') %}
  <nav>
    <a href="/">Buildings</a>
    <a href="/capture">Capture</a>
    <a href="/upload">Upload</a>
    <a href="/gallery">Gallery</a>
    <a href="/logout">Logout</a>
  </nav>
  {% endif %}
  {% with messages = get_flashed_messages() %}
    {% for msg in messages %}
      <div class="flash">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</body>
</html>
