<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}map3d{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           max-width: 1100px; margin: 0 auto; padding: 1em; color: #222; background: #f8f8f8; }
    nav { background: #2c3e50; padding: 0.8em 1.2em; border-radius: 6px; margin-bottom: 1.5em; }
    nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5em; font-weight: 500; }
    nav a:hover { color: #fff; text-decoration: underline; }
    h1, h2, h3 { margin-bottom: 0.5em; }
    h1 { font-size: 1.5em; }
    .flash { background: #d4edda; border: 1px solid #c3e6cb; padding: 0.6em 1em;
             border-radius: 4px; margin-bottom: 1em; }
    .flash.error { background: #f8d7da; border-color: #f5c6cb; }
    form { margin-bottom: 1em; }
    label { display: block; margin: 0.4em 0 0.2em; font-weight: 500; }
    input, select, textarea, button { font-size: 1em; padding: 0.4em 0.6em; }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; max-width: 400px; border: 1px solid #ccc; border-radius: 4px; }
    textarea { height: 3em; }
    button, .btn { background: #2c3e50; color: #fff; border: none; padding: 0.5em 1.2em;
                   border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
    button:hover, .btn:hover { background: #34495e; }
    .btn-sm { padding: 0.3em 0.8em; font-size: 0.85em; }
    .btn-danger { background: #c0392b; }
    .btn-danger:hover { background: #e74c3c; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #ddd; padding: 0.5em 0.8em; text-align: left; }
    th { background: #ecf0f1; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 6px;
            padding: 1em; margin-bottom: 1em; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1em; }
    .grid .thumb { background: #eee; border-radius: 4px; overflow: hidden; }
    .grid .thumb img { width: 100%; height: 180px; object-fit: cover; display: block; }
    .grid .thumb .info { padding: 0.5em; font-size: 0.85em; }
    .tree { list-style: none; padding-left: 1.5em; }
    .tree > li { margin: 0.3em 0; }
    .meta-table td:first-child { font-weight: 500; width: 180px; color: #555; }
    .status-done { color: #27ae60; }
    .status-processing { color: #f39c12; }
    .status-pending { color: #999; }
    .status-failed { color: #c0392b; }
    .inline-form { display: inline; }
    .muted { color: #888; }
    .mb { margin-bottom: 1em; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Buildings</a>
    <a href="/capture">Capture</a>
    <a href="/upload">Upload</a>
    <a href="/gallery">Gallery</a>
  </nav>
  {% with messages = get_flashed_messages() %}
    {% for msg in messages %}
      <div class="flash">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</body>
</html>
