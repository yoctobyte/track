---
- name: Update packages and reboot
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Upgrade installed packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: safe

    - name: Schedule reboot after upgrade and return immediately
      ansible.builtin.shell: |
        set -eu
        nohup sh -c 'sleep 2; if command -v shutdown >/dev/null 2>&1; then shutdown -r now "TRACK DeviceControl update and reboot"; else /sbin/shutdown -r now "TRACK DeviceControl update and reboot"; fi' >/dev/null 2>&1 &
      args:
        executable: /bin/bash
      async: 1
      poll: 0
      changed_when: true
