---
- name: Capture a best-effort desktop screenshot
  hosts: all
  become: true
  gather_facts: false
  vars:
    screenshot_remote_path: /tmp/track-devicecontrol-screenshot.png
    screenshot_display: ":0"
    screenshot_runtime_user: "{{ bootstrap_user | default(ansible_user | default('ansible')) }}"
    screenshot_xauthority: ""
  tasks:
    - name: Install screenshot helper on Debian-like systems
      ansible.builtin.apt:
        name: scrot
        state: present
        update_cache: true
      ignore_errors: true

    - name: Capture screenshot through common Linux tools
      ansible.builtin.shell: |
        set -eu
        runtime_user="{{ screenshot_runtime_user }}"
        runtime_uid="$(id -u "$runtime_user")"
        configured_xauthority="{{ screenshot_xauthority }}"
        tried="/tmp/track-devicecontrol-screenshot-tried.txt"
        : > "$tried"

        find_tool() {
          if command -v scrot >/dev/null 2>&1; then
            echo scrot
          elif command -v gnome-screenshot >/dev/null 2>&1; then
            echo gnome-screenshot
          elif command -v import >/dev/null 2>&1; then
            echo import
          else
            return 1
          fi
        }

        capture_with() {
          display="$1"
          xauthority="$2"
          tool="$3"
          echo "display=$display xauthority=${xauthority:-<unset>} tool=$tool" >> "$tried"
          if [ -n "$xauthority" ]; then
            xauth_env="XAUTHORITY=$xauthority"
          else
            xauth_env=
          fi

          if [ "$tool" = "scrot" ]; then
            runuser -u "$runtime_user" -- env DISPLAY="$display" $xauth_env scrot "{{ screenshot_remote_path }}"
          elif [ "$tool" = "gnome-screenshot" ]; then
            runuser -u "$runtime_user" -- env DISPLAY="$display" $xauth_env gnome-screenshot -f "{{ screenshot_remote_path }}"
          else
            runuser -u "$runtime_user" -- env DISPLAY="$display" $xauth_env import -window root "{{ screenshot_remote_path }}"
          fi
        }

        capture_as_root_with() {
          display="$1"
          xauthority="$2"
          tool="$3"
          [ -n "$xauthority" ] || return 1
          echo "display=$display xauthority=$xauthority tool=$tool run_as=root" >> "$tried"
          if [ "$tool" = "scrot" ]; then
            env DISPLAY="$display" XAUTHORITY="$xauthority" scrot "{{ screenshot_remote_path }}"
          elif [ "$tool" = "gnome-screenshot" ]; then
            env DISPLAY="$display" XAUTHORITY="$xauthority" gnome-screenshot -f "{{ screenshot_remote_path }}"
          else
            env DISPLAY="$display" XAUTHORITY="$xauthority" import -window root "{{ screenshot_remote_path }}"
          fi
        }

        tool="$(find_tool)" || {
          echo "No supported screenshot tool found." >&2
          exit 127
        }

        xauth_candidates=""
        if [ -n "$configured_xauthority" ]; then
          xauth_candidates="$xauth_candidates $configured_xauthority"
        fi
        xauth_candidates="$xauth_candidates /home/$runtime_user/.Xauthority"
        xauth_candidates="$xauth_candidates /run/user/$runtime_uid/gdm/Xauthority"
        xauth_candidates="$xauth_candidates /run/user/$runtime_uid/Xauthority"
        xauth_candidates="$xauth_candidates /var/run/lightdm/root/:0"
        xauth_candidates="$xauth_candidates /var/lib/lightdm/.Xauthority"
        for candidate in /run/user/"$runtime_uid"/.mutter-Xwaylandauth.*; do
          [ -e "$candidate" ] && xauth_candidates="$xauth_candidates $candidate"
        done

        displays="{{ screenshot_display }} :0 :1"
        for display in $displays; do
          if capture_with "$display" "" "$tool" >/tmp/track-devicecontrol-screenshot.err 2>&1; then
            exit 0
          fi
          for xauthority in $xauth_candidates; do
            [ -r "$xauthority" ] || continue
            if capture_with "$display" "$xauthority" "$tool" >/tmp/track-devicecontrol-screenshot.err 2>&1; then
              exit 0
            fi
            if capture_as_root_with "$display" "$xauthority" "$tool" >/tmp/track-devicecontrol-screenshot.err 2>&1; then
              exit 0
            fi
          done
        done

        echo "Screenshot attempts failed." >&2
        echo "Runtime user: $runtime_user uid=$runtime_uid" >&2
        echo "Tried:" >&2
        cat "$tried" >&2
        echo "Last tool error:" >&2
        cat /tmp/track-devicecontrol-screenshot.err >&2
        if command -v scrot >/dev/null 2>&1; then
          scrot --version 2>&1 | head -1 >&2 || true
        fi
        exit 1
      args:
        executable: /bin/bash
      register: screenshot_capture
      changed_when: screenshot_capture.rc == 0
      failed_when: false

    - name: Report screenshot capture failure
      ansible.builtin.debug:
        msg: >-
          Screenshot failed for {{ inventory_hostname }} as {{ screenshot_runtime_user }}
          from display candidates starting at {{ screenshot_display }}:
          {{ screenshot_capture.stderr | default(screenshot_capture.stdout, true) | default('no error output', true) }}
      when: screenshot_capture.rc != 0

    - name: Fetch screenshot
      ansible.builtin.fetch:
        src: "{{ screenshot_remote_path }}"
        dest: "{{ screenshot_output_dir }}/"
        flat: false
      when: screenshot_capture.rc == 0

    - name: Remove temporary screenshot
      ansible.builtin.file:
        path: "{{ screenshot_remote_path }}"
        state: absent
      when: screenshot_capture.rc == 0
