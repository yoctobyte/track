<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Device Control · TRACK</title>
  {% block head %}{% endblock %}
  <style>
    :root {
      --bg: #f4f1e9;
      --panel: #fffaf0;
      --ink: #202018;
      --muted: #706b5f;
      --line: #ddd3bf;
      --accent: #2d6a4f;
      --accent-dark: #16412f;
      --warn: #9a5b00;
      --danger: #9b2727;
      --code: #181711;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Aptos", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 0%, rgba(45, 106, 79, 0.13), transparent 28rem),
        linear-gradient(135deg, #fbf7ed, var(--bg));
      min-height: 100vh;
    }
    header {
      padding: 1.4rem clamp(1rem, 3vw, 2rem);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 250, 240, 0.84);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    main { padding: clamp(1rem, 3vw, 2rem); max-width: 1180px; margin: 0 auto; }
    h1, h2, h3 { margin: 0; line-height: 1.1; }
    h1 { font-family: Georgia, serif; font-size: clamp(1.7rem, 4vw, 2.6rem); }
    a { color: var(--accent-dark); }
    code, pre { font-family: "Cascadia Code", "SFMono-Regular", monospace; }
    pre {
      color: #f4f1e9;
      background: var(--code);
      border-radius: 16px;
      padding: 1rem;
      overflow: auto;
      white-space: pre-wrap;
      line-height: 1.45;
    }
    .muted { color: var(--muted); }
    .stack { display: grid; gap: 1rem; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }
    .device-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .card {
      background: rgba(255, 250, 240, 0.9);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 1rem;
      box-shadow: 0 18px 60px rgba(32, 32, 24, 0.08);
    }
    .card.subtle {
      background: rgba(244, 241, 233, 0.72);
      box-shadow: none;
    }
    .badge {
      display: inline-flex;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
      background: #e9ddc5;
      color: #4a3f2c;
      font-size: 0.82rem;
      font-weight: 700;
    }
    .badge.careful { background: #f0d6a7; color: #653d00; }
    .badge.danger { background: #f1c0bc; color: #7a1717; }
    .badge.fresh { background: #cfe8d8; color: #17442b; }
    .badge.stale { background: #f0d6a7; color: #653d00; }
    .badge.offline, .badge.unknown { background: #f1c0bc; color: #7a1717; }
    .badge.screen-on { background: #cfe8d8; color: #17442b; }
    .badge.screen-black { background: #2a2924; color: #f4f1e9; }
    .badge.screen-failed { background: #f1c0bc; color: #7a1717; }
    .tabs { display: flex; gap: 0.55rem; flex-wrap: wrap; align-items: center; }
    .tab {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.45rem 0.75rem;
      background: rgba(255, 250, 240, 0.72);
      color: var(--accent-dark);
      text-decoration: none;
      font-weight: 700;
    }
    .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 0.65rem 0.85rem;
      color: white;
      background: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-weight: 700;
    }
    .btn.careful { background: var(--warn); }
    .btn.danger { background: var(--danger); }
    .btn.secondary { background: #695f4e; }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.6rem 0.7rem;
      background: white;
      color: var(--ink);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.55rem; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--muted); font-size: 0.85rem; }
    img.thumb { max-width: 100%; border-radius: 12px; border: 1px solid var(--line); }
    .device-link { color: inherit; text-decoration: none; }
    .screenshot-frame {
      display: grid;
      place-items: center;
      aspect-ratio: 16 / 10;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #181711;
      overflow: hidden;
    }
    .screenshot-frame img { width: 100%; height: 100%; object-fit: contain; }
    .placeholder {
      color: #cfc7b6;
      font-weight: 700;
      text-align: center;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <header class="row">
    <div>
      <h1>Device Control</h1>
      <div class="muted">TRACK Ansible control kit · environment <strong>{{ current_environment }}</strong></div>
    </div>
    <nav class="tabs">
      <a class="tab {% if request.endpoint == 'index' or request.endpoint == 'host_detail' %}active{% endif %}" href="{{ url_for('index') }}">Overview</a>
      <a class="tab {% if request.endpoint == 'mass_actions' %}active{% endif %}" href="{{ url_for('mass_actions') }}">Mass Actions</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
