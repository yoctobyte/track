<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f2efe8;
        --panel: #fffaf2;
        --panel-strong: #fff;
        --ink: #221b17;
        --muted: #6b5d54;
        --line: #d8cabf;
        --accent: #0f6c5c;
        --accent-2: #d57e2a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(213, 126, 42, 0.12), transparent 28rem),
          linear-gradient(180deg, #f7f2ea 0%, var(--bg) 100%);
        color: var(--ink);
      }
      a { color: var(--accent); }
      .topbar {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0.65rem 1rem 0;
      }
      .track-link {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        color: var(--muted);
        text-decoration: none;
        font-weight: 700;
        font-size: 0.82rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .track-link:hover { color: var(--accent); }
      .shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 1.1rem 1rem 2rem;
      }
      .hero {
        background: linear-gradient(135deg, rgba(15, 108, 92, 0.09), rgba(213, 126, 42, 0.12));
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 1rem 1.1rem;
      }
      .eyebrow {
        margin: 0 0 0.4rem;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }
      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }
      .subtitle {
        margin: 0.45rem 0 0;
        max-width: 48rem;
        color: var(--muted);
        font-size: 1.05rem;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 0.75rem;
      }
      .meta span {
        display: inline-flex;
        align-items: center;
        padding: 0.5rem 0.8rem;
        border-radius: 999px;
        background: rgba(255,255,255,0.78);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.92rem;
      }
      .layout {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 1rem;
        margin-top: 0.8rem;
      }
      .panel {
        grid-column: span 12;
        background: rgba(255,255,255,0.82);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 0.95rem 1rem;
        backdrop-filter: blur(6px);
      }
      .panel h2, .panel h3 {
        margin: 0 0 0.75rem;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 0.9rem;
      }
      .cards.tight {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 1rem;
        background: var(--panel-strong);
      }
      .card .value {
        display: block;
        margin-top: 0.35rem;
        font-size: 2rem;
        font-weight: 700;
      }
      .muted {
        color: var(--muted);
      }
      .grid-6 { grid-column: span 6; }
      .grid-4 { grid-column: span 4; }
      .list {
        margin: 0;
        padding-left: 1.1rem;
      }
      .list li + li {
        margin-top: 0.55rem;
      }
      .download {
        display: inline-block;
        margin-top: 0.8rem;
        padding: 0.7rem 1rem;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        border: 0;
        cursor: pointer;
      }
      .download.alt {
        background: var(--accent-2);
      }
      code {
        font-family: "IBM Plex Mono", "Fira Code", monospace;
        font-size: 0.95em;
      }
      pre {
        margin: 0;
        padding: 0.85rem;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.78);
        overflow-x: auto;
      }
      input, textarea, button {
        font: inherit;
      }
      input {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--line);
        padding: 0.72rem 0.8rem;
        background: rgba(255,255,255,0.86);
      }
      textarea {
        width: 100%;
        min-height: 5.5rem;
        border-radius: 16px;
        border: 1px solid var(--line);
        padding: 0.8rem 0.9rem;
        background: rgba(255,255,255,0.86);
        resize: vertical;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 0.55rem 0.4rem;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }
      .stack {
        display: grid;
        gap: 0.75rem;
      }
      .split {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.9rem;
      }
      .inventory-list {
        display: grid;
        gap: 0.65rem;
      }
      .inventory-item {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0.75rem 0.9rem;
        background: rgba(255,255,255,0.82);
      }
      .inventory-item h4 {
        margin: 0 0 0.25rem;
      }
      .inventory-item p {
        margin: 0.2rem 0 0;
      }
      .rack-hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        margin-top: 0.65rem;
      }
      .rack-preview-shell {
        display: grid;
        grid-template-columns: minmax(300px, 440px) minmax(260px, 1fr);
        gap: 1rem;
        align-items: start;
      }
      .rack-preview {
        position: relative;
        min-height: 840px;
        border-radius: 24px;
        padding: 1rem;
        border: 2px solid #61534a;
        background:
          linear-gradient(90deg, rgba(34,27,23,0.08) 0 14%, transparent 14% 86%, rgba(34,27,23,0.08) 86% 100%),
          linear-gradient(180deg, rgba(255,255,255,0.55), rgba(0,0,0,0.02)),
          #ece2d2;
        overflow: hidden;
      }
      .rack-grid {
        position: relative;
        min-height: 800px;
        border-radius: 18px;
        background:
          repeating-linear-gradient(
            to bottom,
            rgba(34,27,23,0.10) 0,
            rgba(34,27,23,0.10) 1px,
            transparent 1px,
            transparent calc(100% / 42)
          );
      }
      .rack-unit {
        position: absolute;
        left: 1rem;
        right: 1rem;
        border-radius: 12px;
        border: 1px solid rgba(34,27,23,0.22);
        background: linear-gradient(135deg, rgba(15,108,92,0.85), rgba(15,108,92,0.55));
        color: #fff;
        padding: 0.45rem 0.65rem;
        box-shadow: 0 8px 14px rgba(34,27,23,0.14);
        overflow: hidden;
      }
      .rack-unit strong {
        display: block;
      }
      .rack-unit small {
        display: block;
        opacity: 0.9;
      }
      .photo-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 0.8rem;
      }
      .photo-upload-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 0.9rem;
      }
      .upload-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 0.9rem;
        background: rgba(255,255,255,0.72);
      }
      .upload-card h5 {
        margin: 0 0 0.35rem;
      }
      .photo-card img {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--line);
        display: block;
        background: #ddd2c2;
        aspect-ratio: 4 / 3;
        object-fit: cover;
      }
      .photo-card {
        display: grid;
        gap: 0.45rem;
      }
      .photo-meta {
        display: grid;
        gap: 0.15rem;
      }
      .photo-card a {
        text-decoration: none;
      }
      .photo-card .open-link {
        font-weight: 700;
        font-size: 0.92rem;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 0.4rem 0.7rem;
        background: rgba(255,255,255,0.8);
        color: var(--muted);
        font-size: 0.88rem;
      }
      .quick-capture {
        display: grid;
        gap: 0.9rem;
        padding: 1rem 1.1rem;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.7);
      }
      .quick-capture h3,
      .quick-capture h4,
      .quick-capture p {
        margin: 0;
      }
      .error {
        border-color: rgba(170, 44, 44, 0.28);
        background: rgba(170, 44, 44, 0.08);
        color: #7b1c1c;
      }
      @media (max-width: 820px) {
        .grid-6, .grid-4 { grid-column: span 12; }
        .split,
        .rack-preview-shell { grid-template-columns: 1fr; }
        .rack-preview { min-height: 560px; }
        .rack-grid { min-height: 520px; }
        .topbar { padding: 0.35rem 0.7rem 0; }
        .shell { padding: 0.55rem 0.7rem 1rem; }
        .hero { padding: 0.75rem 0.8rem; border-radius: 18px; }
        .eyebrow { margin-bottom: 0.2rem; font-size: 0.72rem; }
        h1 { font-size: clamp(1.5rem, 7vw, 2rem); }
        .subtitle { margin-top: 0.3rem; font-size: 0.94rem; }
        .meta { gap: 0.45rem; margin-top: 0.5rem; }
        .meta span { padding: 0.38rem 0.58rem; font-size: 0.8rem; }
        .layout { gap: 0.7rem; margin-top: 0.6rem; }
        .panel { padding: 0.8rem 0.8rem; border-radius: 16px; }
        .panel h2, .panel h3, .panel h4 { margin-bottom: 0.45rem; }
        .rack-hero-actions { gap: 0.5rem; margin-top: 0.5rem; }
        .download { margin-top: 0; padding: 0.62rem 0.82rem; font-size: 0.92rem; }
        .quick-capture { padding: 0.8rem; gap: 0.65rem; }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <a class="track-link" href="{{ track_base }}">← TRACK</a>
    </div>
    <main class="shell">
      {% block body %}{% endblock %}
    </main>
  </body>
</html>
