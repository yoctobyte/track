<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f2efe8;
        --panel: #fffaf2;
        --panel-strong: #fff;
        --ink: #221b17;
        --muted: #6b5d54;
        --line: #d8cabf;
        --accent: #0f6c5c;
        --accent-2: #d57e2a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(213, 126, 42, 0.12), transparent 28rem),
          linear-gradient(180deg, #f7f2ea 0%, var(--bg) 100%);
        color: var(--ink);
      }
      a { color: var(--accent); }
      .shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      .hero {
        background: linear-gradient(135deg, rgba(15, 108, 92, 0.09), rgba(213, 126, 42, 0.12));
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 1.5rem;
      }
      .eyebrow {
        margin: 0 0 0.4rem;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }
      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }
      .subtitle {
        margin: 0.8rem 0 0;
        max-width: 48rem;
        color: var(--muted);
        font-size: 1.05rem;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.2rem;
      }
      .meta span {
        display: inline-flex;
        align-items: center;
        padding: 0.5rem 0.8rem;
        border-radius: 999px;
        background: rgba(255,255,255,0.78);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.92rem;
      }
      .layout {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 1rem;
        margin-top: 1.2rem;
      }
      .panel {
        grid-column: span 12;
        background: rgba(255,255,255,0.82);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 1.1rem 1.2rem;
        backdrop-filter: blur(6px);
      }
      .panel h2, .panel h3 {
        margin: 0 0 0.75rem;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 0.9rem;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 1rem;
        background: var(--panel-strong);
      }
      .card .value {
        display: block;
        margin-top: 0.35rem;
        font-size: 2rem;
        font-weight: 700;
      }
      .muted {
        color: var(--muted);
      }
      .grid-6 { grid-column: span 6; }
      .grid-4 { grid-column: span 4; }
      .list {
        margin: 0;
        padding-left: 1.1rem;
      }
      .list li + li {
        margin-top: 0.55rem;
      }
      .download {
        display: inline-block;
        margin-top: 0.8rem;
        padding: 0.7rem 1rem;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      code {
        font-family: "IBM Plex Mono", "Fira Code", monospace;
        font-size: 0.95em;
      }
      pre {
        margin: 0;
        padding: 0.85rem;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.78);
        overflow-x: auto;
      }
      input, textarea, button {
        font: inherit;
      }
      textarea {
        width: 100%;
        min-height: 5.5rem;
        border-radius: 16px;
        border: 1px solid var(--line);
        padding: 0.8rem 0.9rem;
        background: rgba(255,255,255,0.86);
        resize: vertical;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 0.55rem 0.4rem;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }
      @media (max-width: 820px) {
        .grid-6, .grid-4 { grid-column: span 12; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      {% block body %}{% endblock %}
    </main>
  </body>
</html>
